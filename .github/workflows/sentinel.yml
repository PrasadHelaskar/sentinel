name: Sentinel Org Monitor

on:
  schedule:
    - cron: "45 */3 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      OWNER_TOKEN: ${{ secrets.OWNER_TOKEN }}
      OWNER_OWNER: ${{ vars.OWNER_OWNER }}
      OWNER_REPOS: ${{ vars.OWNER_REPOS }}
      ARTIFACT_NAME: ${{ vars.ARTIFACT_NAME }}
      LOGGER_BASE_PATH: ${{ vars.LOGGER_BASE_PATH }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run Sentinel
        run: python -m app.main

      - name: Commit the processed_runs
        run: |
          git config --global user.name "PrasadHelaskar"
          git config --global user.email "helaskarprasad@gmail.com"
      
          git add featured.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update processed runs"

          git remote set-url origin https://x-access-token:${{ secrets.OWNER_TOKEN }}@github.com/PrasadHelaskar/sentinel.git
      
          git push origin master