name: Sentinel Org Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run Sentinel
        env:
          OWNER_TOKEN: ${{ secrets.OWNER_TOKEN }}
          OWNER_OWNER: ${{ vars.OWNER_OWNER }}
          OWNER_REPOS: ${{ vars.OWNER_REPOS }}
          ARTIFACT_NAME: ${{ vars.ARTIFACT_NAME }}
        run: python -m app.main
